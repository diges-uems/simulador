<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Notas Institucionais - UEMS</title>
    <!-- Tailwind CSS para estilização rápida e responsiva -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fontes do Google -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        navy: '#1e3a8a',
                        navyDark: '#1e3a8a',
                        gold: '#d97706',
                        goldLight: '#fef3c7',
                        slateBg: '#f8fafc',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #e2e8f0; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        input[type="number"], select {
            width: 100%;
            padding: 1rem;
            font-size: 1.25rem;
            font-weight: 600;
            border: 2px solid #cbd5e1;
            border-radius: 0.5rem;
            background-color: #ffffff;
            color: #1e293b;
            transition: all 0.2s;
        }
        input[type="number"]:focus, select:focus {
            outline: none;
            border-color: #1e3a8a;
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.2);
        }
        input::placeholder { color: #94a3b8; font-weight: 400; }
        
        label {
            display: block;
            font-weight: 800;
            color: #1e3a8a;
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
        }

        .score-display {
            padding: 2.5rem;
            border-radius: 1rem;
            color: white;
            text-align: center;
            margin-bottom: 2rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
        }
        .score-display .faixa {
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 1.5rem;
            opacity: 0.9;
            display: block;
            margin-bottom: 0.5rem;
        }
        .score-display .val {
            font-family: 'Playfair Display', serif;
            font-size: 5rem;
            font-weight: 700;
            line-height: 1;
        }

        .result-breakdown {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .result-breakdown-title {
            font-weight: 900;
            color: #1e3a8a;
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 0.75rem;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px dashed #e2e8f0;
            font-size: 1.2rem;
        }
        .result-row:last-child { border-bottom: none; }
        .result-row span { color: #475569; font-weight: 600; }
        .result-row strong { color: #0f172a; font-size: 1.4rem; }

        .btn-action {
            padding: 1.25rem 2rem;
            font-size: 1.25rem;
            font-weight: 800;
            border-radius: 0.75rem;
            transition: all 0.2s;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.025em;
            width: 100%;
        }
        .btn-primary { background: #1e3a8a; color: white; }
        .btn-primary:hover { background: #172554; transform: translateY(-2px); }
        .btn-secondary { background: #e2e8f0; color: #1e293b; }
        .btn-secondary:hover { background: #cbd5e1; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-8">

    <div class="bg-white w-full max-w-6xl rounded-2xl shadow-2xl overflow-hidden flex flex-col" style="min-h: 85vh;">
        
        <!-- Header -->
        <div class="bg-navy p-6 md:p-8 text-center relative">
            <h1 class="font-serif text-3xl md:text-5xl font-bold text-white mb-2">Simulador de Indicadores Institucionais</h1>
            <p class="text-blue-200 text-lg md:text-xl font-medium">Análise de Impacto: Cursos de Graduação x Nota Institucional (UEMS)</p>
        </div>

        <div class="p-6 md:p-10 flex-grow flex flex-col">
            
            <!-- SETUP VIEW -->
            <div id="sim-setup-view" class="flex-grow">
                
                <!-- CARREGAR DADOS REAIS OU EXEMPLOS -->
                <div class="mb-8 bg-slate-50 border-2 border-slate-200 rounded-xl p-6 shadow-sm">
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <button onclick="carregarExemplo('positivo')" class="flex items-center justify-center gap-2 bg-emerald-100 hover:bg-emerald-200 text-emerald-800 border-2 border-emerald-300 font-bold py-3 px-4 rounded-lg transition-colors text-lg">
                            Exemplo Prático: O Salto Positivo
                        </button>
                        <button onclick="carregarExemplo('negativo')" class="flex items-center justify-center gap-2 bg-rose-100 hover:bg-rose-200 text-rose-800 border-2 border-rose-300 font-bold py-3 px-4 rounded-lg transition-colors text-lg">
                            Exemplo Prático: O Risco de Queda
                        </button>
                    </div>

                    <div class="relative flex py-5 items-center">
                        <div class="flex-grow border-t border-slate-300"></div>
                        <span class="flex-shrink-0 mx-4 text-slate-400 font-bold uppercase text-sm">OU SELECIONE UM CURSO REAL</span>
                        <div class="flex-grow border-t border-slate-300"></div>
                    </div>

                    <label for="cursoSelector" class="text-navy flex items-center gap-2 text-xl mb-3">
                        Estudo de Caso Institucional
                    </label>
                    <select id="cursoSelector" onchange="carregarCurso()" class="bg-white border-slate-300 text-slate-800 cursor-pointer text-lg p-3">
                        <option value="">-- Selecione para carregar dados do Inep e Autopreencher --</option>
                        <!-- Options serão populadas pelo JS -->
                    </select>

                    <!-- Feedback dinâmico para instruções de apresentação -->
                    <div id="cursoFeedback" class="mt-4 p-4 rounded-lg text-lg font-medium border-l-4" style="display:none;"></div>
                </div>

                <!-- 1. CPC (Painel Único) -->
                <div id="simCPC" class="sim-section block">
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
                        <div class="bg-white border-2 border-emerald-200 p-6 rounded-2xl shadow-md relative">
                            <div class="absolute -top-3 left-4 bg-emerald-500 text-white text-xs font-bold px-2 py-1 rounded">DADOS BÁSICOS DO CURSO</div>
                            <div class="flex justify-between items-center mb-6 border-b-2 border-emerald-100 pb-2 mt-2">
                                <h4 class="font-black text-emerald-800 text-xl uppercase flex items-center gap-2">
                                    <span class="bg-emerald-600 text-white w-8 h-8 rounded-full flex items-center justify-center text-sm">1</span> Inep & Matrículas
                                </h4>
                            </div>
                            <div class="space-y-4">
                                <div>
                                    <label class="text-emerald-900 mb-0">Matrículas Ativas no Curso</label>
                                    <p class="text-xs text-slate-500 font-normal mb-1">Para o cálculo ponderado real do IGC</p>
                                    <input type="number" id="cMatriculas" step="1" min="1" placeholder="Ex: 150">
                                </div>
                                <hr class="border-emerald-100">
                                <div>
                                    <div class="flex justify-between items-center mb-1">
                                        <label class="text-emerald-900 mb-0">Nota Contínua do Enade</label>
                                        <div class="flex gap-2">
                                            <button onclick="adjustGroup(['cNC'], -0.5)" class="bg-emerald-200 text-emerald-900 hover:bg-emerald-300 w-8 h-8 rounded-full font-black text-xl flex items-center justify-center transition-colors shadow-sm" title="Diminuir -0.5">-</button>
                                            <button onclick="adjustGroup(['cNC'], 0.5)" class="bg-emerald-200 text-emerald-900 hover:bg-emerald-300 w-8 h-8 rounded-full font-black text-xl flex items-center justify-center transition-colors shadow-sm" title="Aumentar +0.5">+</button>
                                        </div>
                                    </div>
                                    <input type="number" id="cNC" step="0.1" min="0" max="5" placeholder="Auto preenchido">
                                </div>
                                <div>
                                    <div class="flex justify-between items-center mb-1">
                                        <label class="text-emerald-900 mb-0">Nota do Valor Agregado (IDD)</label>
                                        <div class="flex gap-2">
                                            <button onclick="adjustGroup(['cIDD'], -0.5)" class="bg-emerald-200 text-emerald-900 hover:bg-emerald-300 w-8 h-8 rounded-full font-black text-xl flex items-center justify-center transition-colors shadow-sm" title="Diminuir -0.5">-</button>
                                            <button onclick="adjustGroup(['cIDD'], 0.5)" class="bg-emerald-200 text-emerald-900 hover:bg-emerald-300 w-8 h-8 rounded-full font-black text-xl flex items-center justify-center transition-colors shadow-sm" title="Aumentar +0.5">+</button>
                                        </div>
                                    </div>
                                    <input type="number" id="cIDD" step="0.1" min="0" max="5" placeholder="Auto preenchido">
                                </div>
                            </div>
                        </div>
                        <div class="bg-white border-2 border-emerald-200 p-6 rounded-2xl shadow-md relative">
                            <div class="absolute -top-3 left-4 bg-emerald-500 text-white text-xs font-bold px-2 py-1 rounded">ALTERÁVEL PELO CURSO</div>
                            <div class="flex justify-between items-center mb-6 border-b-2 border-emerald-100 pb-2 mt-2">
                                <h4 class="font-black text-emerald-800 text-xl uppercase flex items-center gap-2">
                                    <span class="bg-emerald-600 text-white w-8 h-8 rounded-full flex items-center justify-center text-sm">2</span> Corpo Docente
                                </h4>
                                <div class="flex gap-2">
                                    <button onclick="adjustGroup(['cNM','cND','cNR'], -0.5)" class="bg-emerald-200 text-emerald-900 hover:bg-emerald-300 w-8 h-8 rounded-full font-black text-xl flex items-center justify-center transition-colors shadow-sm" title="Diminuir -0.5">-</button>
                                    <button onclick="adjustGroup(['cNM','cND','cNR'], 0.5)" class="bg-emerald-200 text-emerald-900 hover:bg-emerald-300 w-8 h-8 rounded-full font-black text-xl flex items-center justify-center transition-colors shadow-sm" title="Aumentar +0.5">+</button>
                                </div>
                            </div>
                            <div class="space-y-4">
                                <div><label class="text-emerald-900 text-sm">Proporção de Mestres</label><input type="number" id="cNM" step="0.1" min="0" max="5" placeholder="Ex: 4.0"></div>
                                <div><label class="text-emerald-900 text-sm">Proporção de Doutores</label><input type="number" id="cND" step="0.1" min="0" max="5" placeholder="Ex: 3.5"></div>
                                <div><label class="text-emerald-900 text-sm">Regime de Trabalho (Tempo Integral ou Parcial)</label><input type="number" id="cNR" step="0.1" min="0" max="5" placeholder="Ex: 4.2"></div>
                            </div>
                        </div>
                        <div class="bg-white border-2 border-emerald-200 p-6 rounded-2xl shadow-md relative">
                            <div class="absolute -top-3 left-4 bg-emerald-500 text-white text-xs font-bold px-2 py-1 rounded">ALTERÁVEL PELO CURSO</div>
                            <div class="flex justify-between items-center mb-6 border-b-2 border-emerald-100 pb-2 mt-2">
                                <h4 class="font-black text-emerald-800 text-xl uppercase flex items-center gap-2">
                                    <span class="bg-emerald-600 text-white w-8 h-8 rounded-full flex items-center justify-center text-sm">3</span> Estudantes
                                </h4>
                                <div class="flex gap-2">
                                    <button onclick="adjustGroup(['cNO','cNF','cNA'], -0.5)" class="bg-emerald-200 text-emerald-900 hover:bg-emerald-300 w-8 h-8 rounded-full font-black text-xl flex items-center justify-center transition-colors shadow-sm" title="Diminuir -0.5">-</button>
                                    <button onclick="adjustGroup(['cNO','cNF','cNA'], 0.5)" class="bg-emerald-200 text-emerald-900 hover:bg-emerald-300 w-8 h-8 rounded-full font-black text-xl flex items-center justify-center transition-colors shadow-sm" title="Aumentar +0.5">+</button>
                                </div>
                            </div>
                            <div class="space-y-4">
                                <div><label class="text-emerald-900 text-sm">Organização Didático-Pedagógica</label><input type="number" id="cNO" step="0.1" min="0" max="5" placeholder="Ex: 3.8"></div>
                                <div><label class="text-emerald-900 text-sm">Infraestrutura e Instalações Físicas</label><input type="number" id="cNF" step="0.1" min="0" max="5" placeholder="Ex: 3.2"></div>
                                <div><label class="text-emerald-900 text-sm">Oportunidades de Ampliação da Formação</label><input type="number" id="cNA" step="0.1" min="0" max="5" placeholder="Ex: 2.9"></div>
                            </div>
                        </div>
                    </div>
                    <button class="btn-action btn-primary" onclick="calcCPC()">Projetar Novo Conceito de Curso e Impacto Institucional</button>
                </div>
            </div>

            <!-- RESULT VIEW -->
            <div id="sim-result-view" class="hidden flex-col justify-center">
                <div id="dynamic-result-content"></div>
                <div class="mt-8 pt-6 border-t-2 border-slate-200">
                    <button onclick="resetSim()" class="btn-action btn-secondary w-full">← Voltar para Painel de Controle</button>
                </div>
            </div>

        </div>
    </div>

            ["Engenharia de Alimentos", "Bacharelado", "Naviraí", 2023, 0.942, 2.924, 2.656, 66, 2.578, 2.228, 3.273, 5.000, 4.551, 0.579],
            ["Gestão Ambiental", "Tecnólogo", "Mundo Novo", 2023, 3.101, 2.994, 3.516, 63, 4.046, 4.230, 4.213, 5.000, 1.364, 0.636],
            ["Enfermagem", "Bacharelado", "Dourados", 2023, 2.773, 2.408, 2.789, 214, 2.838, 2.287, 3.518, 4.496, 2.941, 2.647]
        ];

        const chaves = ["curso", "grau", "unidade", "ano", "enade", "idd", "cpc", "matriculas", "p_no", "p_nf", "p_na", "p_nm", "p_nd", "p_nr"];
        const cursosUEMS = DADOS_COMPACTOS.map(linha => {
            let obj = {};
            chaves.forEach((chave, i) => obj[chave] = linha[i]);
            return obj;
        });

        let cursoSelecionado = null;

        // INICIALIZAÇÃO
        window.onload = () => {
            const select = document.getElementById('cursoSelector');
            cursosUEMS.forEach((c, index) => {
                let opt = document.createElement('option');
                opt.value = index;
                opt.textContent = `${c.curso} (${c.grau}) - ${c.unidade} | Ano: ${c.ano} | CPC Atual: ${c.cpc.toFixed(3)}`;
                select.appendChild(opt);
            });
        };

        const gradientMap = [
            '',
            'linear-gradient(135deg, #ef4444, #991b1b)', // Faixa 1 (Vermelho)
            'linear-gradient(135deg, #f97316, #c2410c)', // Faixa 2 (Laranja)
            'linear-gradient(135deg, #eab308, #854d0e)', // Faixa 3 (Amarelo)
            'linear-gradient(135deg, #3b82f6, #1e3a8a)', // Faixa 4 (Azul)
            'linear-gradient(135deg, #10b981, #064e3b)'  // Faixa 5 (Verde)
        ];

        // FUNÇÃO DE CARREGAMENTO DIRETO DA BASE DE DADOS
        function carregarCurso() {
            const index = document.getElementById('cursoSelector').value;
            if(index === "") {
                cursoSelecionado = null;
                document.getElementById('cursoFeedback').style.display = 'none';
                return;
            }
            
            cursoSelecionado = cursosUEMS[index];
            preencherCamposDaInterface(cursoSelecionado);

            // Oculta o feedback verbal para interação mais limpa
            const feedback = document.getElementById('cursoFeedback');
            feedback.style.display = 'none';
        }

        // CARREGAR EXEMPLOS DIDÁTICOS DE 1 CLIQUE
        function carregarExemplo(tipo) {
            document.getElementById('cursoSelector').value = ""; // limpa o select visualmente
            
            const feedback = document.getElementById('cursoFeedback');
            feedback.style.display = 'block';

            if(tipo === 'positivo') {
                // Seleciona Ciências Biológicas - Dourados (CPC 2.940 - Muito perto da Faixa 4)
                cursoSelecionado = cursosUEMS[7];
                preencherCamposDaInterface(cursoSelecionado);

                feedback.className = "mt-4 p-4 rounded-lg text-lg font-medium border-l-4 bg-emerald-50 text-emerald-900 border-emerald-500 shadow-sm";
                feedback.innerHTML = `<strong>Cenário Carregado: Ciências Biológicas (${cursoSelecionado.grau}) - Dourados (${cursoSelecionado.matriculas} matrículas).</strong> Este curso está com o Conceito Preliminar de 2.940, quase atingindo a Faixa 4 (2.945). <br>Use os botões <strong>(+)</strong> ao lado de <strong>Estudantes</strong> ou <strong>Corpo Docente</strong> abaixo para dar um pequeno empurrão na nota. Clique em Projetar e veja o curso pular de faixa, elevando a nota da instituição!`;
            
            } else if (tipo === 'negativo') {
                // Seleciona Matemática - Cassilândia (CPC 1.959 - Risco iminente de cair para Faixa 2)
                cursoSelecionado = cursosUEMS[22];
                preencherCamposDaInterface(cursoSelecionado);

                feedback.className = "mt-4 p-4 rounded-lg text-lg font-medium border-l-4 bg-rose-50 text-rose-900 border-rose-500 shadow-sm";
                feedback.innerHTML = `<strong>Cenário Carregado: Matemática (${cursoSelecionado.grau}) - Cassilândia (${cursoSelecionado.matriculas} matrículas).</strong> Este curso está com o Conceito Preliminar de 1.959, perigosamente perto de cair para a Faixa 2 (1.945). <br>Use os botões <strong>(-)</strong> ao lado de <strong>Estudantes</strong> abaixo para simular um leve desengajamento no questionário. Veja como ele cai de faixa rapidamente.`;
            }
        }

        // PREENCHE A INTERFACE COM OS DADOS REAIS DO INEP
        function preencherCamposDaInterface(curso) {
            document.getElementById('cNC').value = curso.enade;
            document.getElementById('cIDD').value = curso.idd > 0 ? curso.idd : '';
            document.getElementById('cMatriculas').value = curso.matriculas;
            document.getElementById('cNM').value = curso.p_nm.toFixed(2);
            document.getElementById('cND').value = curso.p_nd.toFixed(2);
            document.getElementById('cNR').value = curso.p_nr.toFixed(2);
            document.getElementById('cNO').value = curso.p_no.toFixed(2);
            document.getElementById('cNF').value = curso.p_nf.toFixed(2);
            document.getElementById('cNA').value = curso.p_na.toFixed(2);
        }

        function resetSim() {
            document.getElementById('sim-setup-view').classList.remove('hidden');
            document.getElementById('sim-setup-view').classList.add('flex-grow');
            document.getElementById('sim-result-view').classList.add('hidden');
            document.getElementById('sim-result-view').classList.remove('flex');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showResultView(htmlContent) {
            document.getElementById('sim-setup-view').classList.add('hidden');
            document.getElementById('sim-setup-view').classList.remove('flex-grow');
            document.getElementById('dynamic-result-content').innerHTML = htmlContent;
            document.getElementById('sim-result-view').classList.remove('hidden');
            document.getElementById('sim-result-view').classList.add('flex');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function getFaixa(nota) {
            if(nota < 0.945) return 1;
            if(nota < 1.945) return 2;
            if(nota < 2.945) return 3;
            if(nota < 3.945) return 4;
            return 5;
        }

        // FUNÇÃO RÁPIDA: Ajusta múltiplos campos de uma vez (+ ou -)
        function adjustGroup(inputIds, amount) {
            inputIds.forEach(id => {
                const input = document.getElementById(id);
                if(input) {
                    let val = parseFloat(input.value) || 0;
                    val += amount;
                    val = Math.max(0, Math.min(5, val)); // Mantém entre 0 e 5
                    input.value = val.toFixed(2);
                    
                    // Efeito visual rápido de destaque (flash verde claro)
                    const originalBg = input.style.backgroundColor;
                    input.style.backgroundColor = '#d1fae5'; 
                    setTimeout(() => {
                        input.style.backgroundColor = originalBg;
                    }, 300);
                }
            });
        }

        // --- CÁLCULOS & VISUALIZAÇÃO DE IMPACTO --- //

        function gerarCardImpacto(novoCpc) {
            if(!cursoSelecionado) return '';

            const cpcAntigo = cursoSelecionado.cpc;
            const deltaCpc = novoCpc - cpcAntigo;
            
            // Pega o número de matrículas atualizado pelo usuário na tela
            const matriculasCurso = parseFloat(document.getElementById('cMatriculas').value) || cursoSelecionado.matriculas;
            
            // Total de matrículas da graduação (Soma da base de dados + ajuste da tela)
            let totalMatriculasGraduacao = cursosUEMS.reduce((acc, c) => acc + c.matriculas, 0);
            totalMatriculasGraduacao = totalMatriculasGraduacao - cursoSelecionado.matriculas + matriculasCurso;

            // Ponderação do curso dentro apenas da Graduação
            const proporcaoCursoNaGraduacao = matriculasCurso / totalMatriculasGraduacao;
            
            // Novo G_IES (Conceito Médio de Graduação)
            const deltaG_IES = deltaCpc * proporcaoCursoNaGraduacao;
            const novoG_IES = G_IES_ATUAL + deltaG_IES;

            // CÁLCULO EXATO DO NOVO IGC (NT 9/2024) - Mantendo Mestrado e Doutorado estáticos
            const novoIgcEstimado = (ALFA_GRADUACAO * novoG_IES) + (BETA_MESTRADO * M_IES) + (GAMA_DOUTORADO * D_IES);

            const isMelhoria = deltaCpc > 0.001; // margem flutuante
            const isQueda = deltaCpc < -0.001;
            
            let colorClass = 'text-slate-700';
            let bgClass = 'bg-slate-50 border-slate-300';
            let alertMsg = 'Nenhuma alteração significativa identificada.';

            if (isMelhoria) {
                colorClass = 'text-emerald-700';
                bgClass = 'bg-emerald-50 border-emerald-300';
                alertMsg = `<strong>Efeito Alavanca:</strong> Parabéns! A melhoria do curso gerou uma variação positiva na Nota Média da Graduação. Mantendo a Pós-Graduação constante, isso empurrou o Índice Geral da Instituição para cima!`;
            } else if (isQueda) {
                colorClass = 'text-rose-700';
                bgClass = 'bg-rose-50 border-rose-300';
                alertMsg = `<strong>Efeito Cascata Negativo:</strong> Atenção! A queda de desempenho do curso comprometeu o Conceito Médio de Graduação da universidade inteira, puxando o IGC Global para baixo.`;
            }

            return `
                <div class="mt-8 border-4 rounded-2xl p-6 shadow-lg ${bgClass}">
                    <h3 class="font-black text-2xl uppercase mb-4 text-center ${colorClass}">Análise de Impacto Institucional (NT 9/2024)</h3>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 text-center mb-6">
                        <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm relative">
                            <div class="absolute -top-3 right-4 bg-slate-800 text-white text-xs font-bold px-2 py-1 rounded shadow">${cursoSelecionado.curso} (${cursoSelecionado.grau})</div>
                            <div class="text-sm font-bold text-slate-500 uppercase mb-1">Efeito Local (O Curso)</div>
                            <div class="text-lg text-slate-700">Conceito Preliminar de Curso (CPC) Original: <br><strong>${cpcAntigo.toFixed(3)}</strong> (Faixa ${getFaixa(cpcAntigo)})</div>
                            <div class="text-xl ${colorClass} font-black mt-2">Novo Conceito Preliminar de Curso (CPC): <br>${novoCpc.toFixed(3)} (Faixa ${getFaixa(novoCpc)})</div>
                        </div>
                        
                        <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm relative overflow-hidden">
                            <div class="text-sm font-bold text-slate-500 uppercase mb-1">Efeito Global (A Universidade)</div>
                            <div class="text-lg text-slate-700">Índice Geral de Cursos (IGC) Atual: <br><strong>${IGC_ATUAL_UEMS.toFixed(4)}</strong></div>
                            <div class="text-xl ${colorClass} font-black mt-2 flex items-center justify-center gap-2">
                                Novo Índice Geral de Cursos (IGC) Estimado: <br>${novoIgcEstimado.toFixed(4)}
                            </div>
                            <div class="mt-3 text-xs text-slate-400 font-normal leading-tight">
                                *Cálculo paramétrico exato: Graduação (Peso: ${(ALFA_GRADUACAO * 100).toFixed(1)}%), Mestrado (Peso: ${(BETA_MESTRADO * 100).toFixed(1)}%) e Doutorado (Peso: ${(GAMA_DOUTORADO * 100).toFixed(1)}%).
                            </div>
                        </div>
                    </div>

                    <p class="text-center font-medium ${colorClass} text-xl">
                        ${alertMsg}
                    </p>
                </div>
            `;
        }

        function calcCPC() {
            const NC = parseFloat(document.getElementById('cNC').value)||0;
            const NIDD = document.getElementById('cIDD').value !== '' ? parseFloat(document.getElementById('cIDD').value) : null;
            const NM = parseFloat(document.getElementById('cNM').value)||0;
            const ND = parseFloat(document.getElementById('cND').value)||0;
            const NR = parseFloat(document.getElementById('cNR').value)||0;
            const NO = parseFloat(document.getElementById('cNO').value)||0;
            const NF = parseFloat(document.getElementById('cNF').value)||0;
            const NA = parseFloat(document.getElementById('cNA').value)||0;
            
            let ncpc, hasIddWarning = false;
            if(NIDD === null) {
                ncpc = 0.55*NC + 0.075*NM + 0.15*ND + 0.075*NR + 0.075*NO + 0.05*NF + 0.025*NA;
                hasIddWarning = true;
            } else {
                ncpc = 0.20*NC + 0.35*NIDD + 0.075*NM + 0.15*ND + 0.075*NR + 0.075*NO + 0.05*NF + 0.025*NA;
            }
            
            let faixa = getFaixa(ncpc);
            const allOk = [NC,NM,ND,NR,NO,NF,NA,...(NIDD!==null?[NIDD]:[])].every(v=>v>0.945);
            let trapWarning = false;
            
            if(ncpc >= 3.945 && !allOk) {
                faixa = 4; 
                trapWarning = true; 
            }

            const painelImpacto = gerarCardImpacto(ncpc);

            let html = `
                <div class="score-display" style="background: ${gradientMap[faixa]};">
                    <span class="faixa">Nova Faixa Projetada do Conceito Preliminar de Curso (CPC): ${faixa}</span>
                    <div class="val">${ncpc.toFixed(3)}</div>
                </div>
                
                ${hasIddWarning ? `<div class="bg-amber-100 border-l-4 border-amber-500 text-amber-900 p-4 mb-6 rounded-r-lg font-semibold text-lg shadow-sm"><strong>Atenção:</strong> Sem o Indicador de Diferença de Desempenho (IDD) calculado, o peso da Nota Contínua do Enade sobe para impactantes 55%.</div>` : ''}
                ${trapWarning ? `<div class="bg-rose-100 border-l-4 border-rose-500 text-rose-900 p-4 mb-6 rounded-r-lg font-semibold text-lg shadow-sm"><strong>Atenção - Armadilha Estrutural do MEC:</strong> A nota contínua atingiu a pontuação para a Faixa 5, mas foi travada na Faixa 4 devido a um indicador base que obteve nota inferior a 0,945.</div>` : ''}
                
                ${painelImpacto}

                <div class="result-breakdown mt-8">
                    <div class="result-breakdown-title">Origem Analítica do Novo Conceito Preliminar de Curso</div>
                    <div class="result-row"><span>Nota Contínua do Enade</span><strong>${NC.toFixed(2)}</strong></div>
                    <div class="result-row"><span>Indicador de Diferença de Desempenho (IDD)</span><strong>${NIDD===null?'Não Aplicável':NIDD.toFixed(2)}</strong></div>
                    <div class="result-row"><span>Corpo Docente (Sua Simulação)</span><strong>${((NM+ND+NR)/3).toFixed(2)}</strong></div>
                    <div class="result-row"><span>Questionário do Estudante (Sua Simulação)</span><strong>${((NO+NF+NA)/3).toFixed(2)}</strong></div>
                </div>
            `;
            showResultView(html);
        }
    </script>
</body>
</html>
